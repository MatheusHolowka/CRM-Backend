services:
  mongodb:
    image: mongo:latest
    container_name: core-crm-db
    restart: always
    # O entrypoint original que você definiu mantém o RS ativo
    entrypoint: [ "/usr/bin/mongod", "--bind_ip_all", "--replSet", "rs0" ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-rs.sh:/docker-entrypoint-initdb.d/init-rs.sh # Executa ao iniciar o banco

api:
  build: .
  container_name: core-crm-api
  restart: always
  environment:
    DATABASE_URL: ${DATABASE_URL}
  depends_on:
    - mongodb
  command: >
    sh -c "npx prisma db push && 
           npx prisma db seed && 
           node dist/main"
  mongo-express:
    image: mongo-express:latest
    container_name: core-crm-ui
    restart: always
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin&replicaSet=rs0
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_CONFIG_BASICAUTH_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_CONFIG_BASICAUTH_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      - mongodb

volumes:
  mongodb_data: